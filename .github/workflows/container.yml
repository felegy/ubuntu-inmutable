name: container-ci

on:
  push:
    branches:
      - main
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write
  packages: write
  security-events: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: EditorConfig Check
        uses: editorconfig-checker/action-editorconfig-checker@v2

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: ShellCheck
        run: shellcheck build.sh

  resolve-versions:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      kairos_version: ${{ steps.kairos-version.outputs.kairos_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch k3s Latest Versions
        id: k3s
        run: |
          kubernetes_versions=$(curl -s https://api.github.com/repos/k3s-io/k3s/releases | jq -r '
            [.[] | select(.prerelease == false and .draft == false and (.tag_name | test("rc") | not)) | .tag_name]
            | map(select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+\\+k3s[0-9]+$")))
            | map({
                version: .,
                minor: (split(".")[1:2] | join("")),
                patch: (split(".")[2:3] | join("") | split("+")[0]),
                revision: (split("+k3s")[1])
              })
            | group_by(.minor)
            | map(sort_by([(.patch | tonumber), (.revision | tonumber)]) | reverse | .[0])
            | sort_by(.minor | tonumber)
            | reverse
            | .[0:3]
            | map(.version)
          ' | jq -c '.')

          echo "kubernetes_versions=$kubernetes_versions" >> "$GITHUB_OUTPUT"

      - name: Resolve Kairos Version From Latest Tag
        id: kairos-version
        run: |
          latest_tag=$(git tag --sort=-version:refname | head -n1 || true)
          if [ -z "$latest_tag" ]; then
            kairos_version="0.1"
          else
            kairos_version="${latest_tag#v}"
          fi
          echo "kairos_version=$kairos_version" >> "$GITHUB_OUTPUT"

      - name: Build matrix payload
        id: matrix
        env:
          KUBERNETES_VERSIONS: ${{ steps.k3s.outputs.kubernetes_versions }}
        run: |
          matrix=$(jq -cn --argjson versions "$KUBERNETES_VERSIONS" '
            {
              include: (
                [
                  {
                    kubernetes_distro: "",
                    kubernetes_version: "",
                    image_extra_tag: "iso",
                    is_primary_tag_target: false
                  }
                ]
                +
                (
                  $versions
                  | to_entries
                  | map({
                      kubernetes_distro: "k3s",
                      kubernetes_version: .value,
                      image_extra_tag: (
                        .value
                        | capture("^(?<major>v[0-9]+)\\.(?<minor>[0-9]+)\\.[0-9]+\\+k3s[0-9]+$")
                        | "k3s-\(.major).\(.minor)"
                      ),
                      is_primary_tag_target: (.key == 0)
                    })
                )
              )
            }
          ')

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build-and-publish:
    needs: resolve-versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-versions.outputs.matrix) }}
    env:
      CI: "true"
      BUILD_VERBOSITY: normal
      IMAGE_NAME: ghcr.io/${{ github.repository }}
      BASE_IMAGE: ubuntu:24.04
      KAIROS_INIT_VERSION: 0.7.0
      KAIROS_DEFAULT_USER: kairos
      KAIROS_VARIANT: core
      KAIROS_MODEL: generic
      KAIROS_TRUSTED_BOOT: "false"
      KAIROS_VERSION: ${{ needs.resolve-versions.outputs.kairos_version }}
      KUBERNETES_DISTRO: ${{ matrix.kubernetes_distro }}
      KUBERNETES_VERSION: ${{ matrix.kubernetes_version }}
      IMAGE_EXTRA_TAG: ${{ matrix.image_extra_tag }}
      IS_PRIMARY_TAG_TARGET: ${{ matrix.is_primary_tag_target }}
      KAIROS_DEBS: open-vm-tools
    steps:
      - name: Decide whether this matrix entry should run
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "release" ] && [ "${{ matrix.image_extra_tag }}" != "iso" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        uses: actions/checkout@v4

      - name: Setup .NET
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Docker Buildx
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Trivy
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Scripted CI
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        run: ./build.sh ci --push true --verbosity "$BUILD_VERBOSITY"

  build-iso:
    needs: build-and-publish
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'release' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build offline ISO from published iso image
        run: |
          mkdir -p build
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/iso-config.yaml:/config.yaml" \
            -v "${PWD}/build:/tmp/auroraboot" \
            kairos.docker.scarf.sh/kairos/auroraboot \
              --cloud-config /config.yaml \
              --set "container_image=oci:ghcr.io/${{ github.repository }}:iso" \
              --set "disable_netboot=true" \
              --set "disable_http_server=true" \
              --set "state_dir=/tmp/auroraboot"

      - name: Validate ISO output
        run: |
          shopt -s nullglob
          isos=(build/*.iso)
          if [ ${#isos[@]} -eq 0 ]; then
            echo "No ISO artifacts found under build/iso"
            find build -maxdepth 3 -type f | sort
            exit 1
          fi

      - name: Generate normalized checksums
        run: |
          cd build
          sha256sum *.iso > SHA256SUMS

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.iso
            build/*.sha256
            build/SHA256SUMS
          overwrite_files: true
          fail_on_unmatched_files: false
