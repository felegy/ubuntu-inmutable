name: container-ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: ShellCheck
        run: shellcheck build.sh

  resolve-versions:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      kairos_version: ${{ steps.kairos-version.outputs.kairos_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch k3s Latest Versions
        id: k3s
        run: |
          kubernetes_versions=$(curl -s https://api.github.com/repos/k3s-io/k3s/releases | jq -r '
            [.[] | select(.prerelease == false and .draft == false and (.tag_name | test("rc") | not)) | .tag_name]
            | map(select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+\\+k3s[0-9]+$")))
            | map({
                version: .,
                minor: (split(".")[1:2] | join("")),
                patch: (split(".")[2:3] | join("") | split("+")[0]),
                revision: (split("+k3s")[1])
              })
            | group_by(.minor)
            | map(sort_by([(.patch | tonumber), (.revision | tonumber)]) | reverse | .[0])
            | sort_by(.minor | tonumber)
            | reverse
            | .[0:3]
            | map(.version)
          ' | jq -c '.')

          echo "kubernetes_versions=$kubernetes_versions" >> "$GITHUB_OUTPUT"

      - name: Resolve Kairos Version From Latest Tag
        id: kairos-version
        run: |
          latest_tag=$(git tag --sort=-version:refname | head -n1 || true)
          if [ -z "$latest_tag" ]; then
            kairos_version="0.1"
          else
            kairos_version="${latest_tag#v}"
          fi
          echo "kairos_version=$kairos_version" >> "$GITHUB_OUTPUT"

      - name: Build matrix payload
        id: matrix
        env:
          KUBERNETES_VERSIONS: ${{ steps.k3s.outputs.kubernetes_versions }}
        run: |
          matrix=$(jq -cn --argjson versions "$KUBERNETES_VERSIONS" '
            {
              include: (
                [
                  {
                    kubernetes_distro: "",
                    kubernetes_version: "",
                    image_extra_tag: "iso",
                    is_primary_tag_target: false
                  }
                ]
                +
                (
                  $versions
                  | to_entries
                  | map({
                      kubernetes_distro: "k3s",
                      kubernetes_version: .value,
                      image_extra_tag: (
                        .value
                        | capture("^(?<major>v[0-9]+)\\.(?<minor>[0-9]+)\\.[0-9]+\\+k3s[0-9]+$")
                        | "k3s-\(.major).\(.minor)"
                      ),
                      is_primary_tag_target: (.key == 0)
                    })
                )
              )
            }
          ')

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build-and-publish:
    needs: resolve-versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-versions.outputs.matrix) }}
    env:
      CI: "true"
      BUILD_VERBOSITY: ${{ vars.BUILD_VERBOSITY || 'normal' }}
      IMAGE_NAME: ghcr.io/${{ gitea.repository }}
      BASE_IMAGE: ubuntu:24.04
      KAIROS_INIT_VERSION: 0.7.0
      KAIROS_DEFAULT_USER: ${{ gitea.repository_owner}}
      KAIROS_VARIANT: core
      KAIROS_MODEL: generic
      KAIROS_TRUSTED_BOOT: "false"
      KAIROS_VERSION: ${{ needs.resolve-versions.outputs.kairos_version }}
      KUBERNETES_DISTRO: ${{ matrix.kubernetes_distro }}
      KUBERNETES_VERSION: ${{ matrix.kubernetes_version }}
      IMAGE_EXTRA_TAG: ${{ matrix.image_extra_tag }}
      IS_PRIMARY_TAG_TARGET: ${{ matrix.is_primary_tag_target }}
      KAIROS_DEBS: >
        nfs-common
        ${{ vars.KAIROS_DEBS || 'open-vm-tools' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Docker Buildx
        run: |
          docker buildx create --use --name ci-builder || docker buildx use ci-builder
          docker buildx inspect --bootstrap

      - name: Login to GHCR
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ghcr.io -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Scripted CI
        run: ./build.sh ci --push true --verbosity "$BUILD_VERBOSITY"

  build-bundles:
    needs: validate
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BUILD_VERBOSITY: ${{ vars.BUILD_VERBOSITY || 'normal' }}
      DOCKER_VERSION: ${{ vars.DOCKER_VERSION || 'latest' }}
      IMAGE_NAME: ghcr.io/${{ gitea.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Docker Buildx
        run: |
          docker buildx create --use --name ci-builder || docker buildx use ci-builder
          docker buildx inspect --bootstrap

      - name: Bundle E2E Smoke (PR)
        if: ${{ gitea.event_name == 'pull_request' }}
        run: ./tests/bundle-e2e.sh helm

      - name: Bundle E2E Full (main/manual)
        if: ${{ gitea.event_name != 'pull_request' }}
        run: ./tests/bundle-e2e.sh all

      - name: Login to GHCR
        if: ${{ gitea.event_name != 'pull_request' }}
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ghcr.io -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Run Bundle CI
        if: ${{ gitea.event_name != 'pull_request' }}
        run: dotnet script bundles/build.csx -- bundle-ci --push true --verbosity "$BUILD_VERBOSITY"
